<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水源轮值</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; background: #1a1a2e; color: #e0e0e0; }
    #status { background: #16213e; padding: 1rem; border-radius: 6px; margin-bottom: 1rem; line-height: 1.8; }
    #actions { margin-bottom: 1rem; }
    #actions button { padding: 0.5rem 1rem; margin: 0.25rem; border: 1px solid #0f3460; background: #0f3460; color: #e0e0e0; border-radius: 4px; cursor: pointer; }
    #actions button:hover { background: #1a5276; }
    #log { background: #0a0a1a; padding: 0.75rem; border-radius: 6px; min-height: 120px; font-size: 0.85rem; line-height: 1.6; }
    .log-entry { border-bottom: 1px solid #222; padding: 2px 0; }
    h1 { color: #4fc3f7; font-size: 1.4rem; }
  </style>
</head>
<body>
  <h1>水源轮值</h1>
  <div id="status"></div>
  <div id="actions"></div>
  <div id="log"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
